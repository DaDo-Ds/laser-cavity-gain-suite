<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laser Cavity Gain Simulation Suite</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 520px;
            width: 90%;
        }
        h1 {
            color: #24292e;
            font-size: 24px;
            margin-bottom: 12px;
        }
        p {
            color: #586069;
            font-size: 16px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        @media(min-width: 480px) {
            .actions {
                flex-direction: row;
                justify-content: center;
            }
        }
        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 15px;
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn-calc {
            background-color: #2ea44f;
            color: white;
            border: 1px solid #1b7c3a;
        }
        .btn-calc:hover {
            background-color: #2c974b;
        }
        .btn-repo {
            background-color: #24292e;
            color: white;
            border: 1px solid #1b1f23;
        }
        .btn-repo:hover {
            background-color: #2c3137;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Laser Cavity Gain Simulation Suite</h1>
        <p>Seleccione una opción para comenzar a explorar los recursos del proyecto:</p>
        <div class="actions">
            <a class="btn btn-calc" href="src/web/laser_calculator.html">Abrir Calculadora Interactiva</a>
            <a class="btn btn-repo" href="https://github.com/DaDo-Ds/laser-cavity-gain-suite">Ver Código en GitHub</a>
        </div>
    </div>
</body>
</html>
